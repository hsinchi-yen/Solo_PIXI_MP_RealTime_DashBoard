# Drop-in: remove network-online.target dependency from docker.service.
#
# Docker daemon only needs the kernel socket / bridge stack, not full
# LAN readiness.  On tep-imx8mp this dependency previously caused a
# ~120s delay whenever systemd-networkd-wait-online.service timed out.
#
# We keep: docker.socket  (required — socket activation)
#          containerd.service  (required — runtime)
#          firewalld.service   (ordering only, present on some images)
[Unit]
After=
After=docker.socket containerd.service firewalld.service
Wants=
