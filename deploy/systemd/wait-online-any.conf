# Drop-in: make systemd-networkd-wait-online succeed when ANY managed
# interface reaches "configured" state instead of waiting for ALL of them.
#
# Root cause on tep-imx8mp:
#   eth0  = routable / configured  (LAN, connected)
#   eth1  = no-carrier / configuring (unused port, no cable)
#
# Without --any the service times out after ~120s waiting for eth1,
# blocking docker.service (which has After=network-online.target).
# With --any it succeeds as soon as eth0 is up (<5s after boot).
[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any --timeout=20
